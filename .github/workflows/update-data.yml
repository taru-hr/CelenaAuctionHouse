name: Update auction data

# Hourly: pull commodities + Ravencrest BoEs, store them on the `data` branch
# (single always-overwritten commit), then deploy the site directly — no
# workflow_run hand-off, so the live site can't fall behind the data.

on:
  schedule:
    - cron: '7 * * * *'      # hourly at :07 (a few min after Blizzard's ~hourly refresh)
  workflow_dispatch:          # lets you trigger a run manually from the Actions tab

permissions:
  contents: write             # push the data branch
  pages: write                # deploy Pages
  id-token: write             # Pages OIDC

concurrency:
  group: pages                # shared with deploy.yml so deploys never race
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout (app + scripts)
        uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Restore existing data branch
        run: |
          mkdir -p data/history
          if git ls-remote --exit-code --heads origin data >/dev/null 2>&1; then
            git fetch --depth=1 origin data
            git archive FETCH_HEAD | tar -x -C data
            echo "Restored $(ls data/history | wc -l) history files."
          else
            echo "No data branch yet — starting fresh."
          fi

      - name: Fetch commodities
        env:
          BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
          BLIZZARD_CLIENT_SECRET: ${{ secrets.BLIZZARD_CLIENT_SECRET }}
          WOW_REGION: eu
          WOW_LOCALE: en_GB
          HISTORY_DAYS: '60'
          MAX_NEW_META: '12000'   # backfill all item names in one run (~2 calls each, well under the 36k/hr limit)
        run: node scripts/fetch-commodities.mjs

      - name: Fetch Midnight BoEs (Ravencrest)
        continue-on-error: true    # don't fail the whole run if BoE fetch has a hiccup
        env:
          BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
          BLIZZARD_CLIENT_SECRET: ${{ secrets.BLIZZARD_CLIENT_SECRET }}
          WOW_REGION: eu
          WOW_LOCALE: en_GB
          WOW_REALM_SLUG: ravencrest
        run: node scripts/fetch-boes.mjs

      - name: Publish to data branch
        run: |
          cd data
          rm -rf .git
          git init -q -b data
          git add -A
          git -c user.name='github-actions[bot]' \
              -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              commit -qm "data update $(date -u +%Y-%m-%dT%H:%MZ)"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ----- deploy the freshly-fetched data straight to Pages -----
      - name: Assemble site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude '.git' --exclude '.github' --exclude '.claude' \
            --exclude 'node_modules' --exclude 'scripts' --exclude 'dist' --exclude '_site' \
            --exclude 'webpack.*.js' --exclude 'webpack.common.js' \
            --exclude 'package.json' --exclude 'package-lock.json' \
            --exclude '.editorconfig' --exclude '.gitattributes' --exclude '.gitignore' \
            --exclude 'data' \
            ./ _site/
          mkdir -p _site/data
          rsync -a --exclude '.git' data/ _site/data/
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
